plugins:
  - jekyll-feed
  - jekyll-remote-theme

remote_theme: "pages-themes/cayman@v0.2.0"

title: "Rhododendron Research Network"
description: "Documentation and projects for the R-RN"

author:
  name: Alan Elliott
  email: aelliott@rbge.org.uk

# IMPORTANT: ensure Jekyll processes the rrn_taxa folder
collections:
  rrn_taxa:
    output: true
    permalink: /taxa/:slug/

# REQUIRED: tell Jekyll to include the folder in the build
include:
  - rrn_taxa

feed:
  path: feed.xml
  collections:
    - rrn_taxa

force_rebuild: true
